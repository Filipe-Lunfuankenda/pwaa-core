        // DOM elements
        const jokesContainer = document.getElementById('jokes-container');
        const categoryButtons = document.querySelectorAll('.category-btn');
        const randomBtn = document.getElementById('random-btn');
        const themeToggle = document.getElementById('theme-toggle');

        // Display jokes
        function displayJokes(category = 'all') {
            jokesContainer.innerHTML = '';
            
            const filteredJokes = category === 'all' 
                ? jokes 
                : jokes.filter(joke => joke.category === category);
            
            filteredJokes.forEach(joke => {
                const jokeCard = document.createElement('div');
                jokeCard.className = 'joke-card bg-white dark:bg-gray-800 rounded-xl p-6 shadow-md fade-in';
                jokeCard.innerHTML = `
                    <div class="flex justify-between items-start">
                        <div class="flex-1">
                            <span class="inline-block px-3 py-1 text-xs font-semibold rounded-full mb-3 
                                ${getCategoryColor(joke.category)}">
                                ${getCategoryName(joke.category)}
                            </span>
                            <p class="text-gray-800 dark:text-gray-200 mb-4">${joke.content}</p>
                        </div>
                        <button class="like-btn ml-4 text-gray-400 hover:text-accent transition" data-id="${joke.id}">
                            <i class="far fa-heart"></i>
                            <span class="text-xs ml-1 like-count">${joke.likes}</span>
                        </button>
                    </div>
                `;
                jokesContainer.appendChild(jokeCard);
            });

            // Add event listeners to like buttons
            document.querySelectorAll('.like-btn').forEach(btn => {
                btn.addEventListener('click', function() {
                    const id = parseInt(this.getAttribute('data-id'));
                    const joke = jokes.find(j => j.id === id);
                    if (joke) {
                        joke.likes++;
                        this.querySelector('.like-count').textContent = joke.likes;
                        this.innerHTML = `<i class="fas fa-heart text-accent"></i><span class="text-xs ml-1 like-count">${joke.likes}</span>`;
                    }
                });
            });
        }

        // Get category color
        function getCategoryColor(category) {
            const colors = {
                'eletronica': 'bg-blue-100 text-blue-800 dark:bg-blue-900 dark:text-blue-200',
                'linguistica': 'bg-purple-100 text-purple-800 dark:bg-purple-900 dark:text-purple-200',
                'programacao': 'bg-yellow-100 text-yellow-800 dark:bg-yellow-900 dark:text-yellow-200',
                'matematica': 'bg-red-100 text-red-800 dark:bg-red-900 dark:text-red-200',
                'fisica': 'bg-green-100 text-green-800 dark:bg-green-900 dark:text-green-200',
                'telecom': 'bg-indigo-100 text-indigo-800 dark:bg-indigo-900 dark:text-indigo-200',
                'social': 'bg-pink-100 text-pink-800 dark:bg-pink-900 dark:text-pink-200',
                'orgulho': 'bg-orange-100 text-orange-800 dark:bg-orange-900 dark:text-orange-200',
                'astucia': 'bg-teal-100 text-teal-800 dark:bg-teal-900 dark:text-teal-200',
                'feminismo': 'bg-rose-100 text-rose-800 dark:bg-rose-900 dark:text-rose-200'
            };
            return colors[category] || 'bg-gray-100 text-gray-800 dark:bg-gray-700 dark:text-gray-200';
        }

        // Get category name
        function getCategoryName(category) {
            const names = {
                'eletronica': 'Eletrônica',
                'linguistica': 'Linguística',
                'programacao': 'Programação',
                'matematica': 'Matemática',
                'fisica': 'Física',
                'telecom': 'Telecomunicações',
                'social': 'Status Social',
                'orgulho': 'Orgulho Humano',
                'astucia': 'Astúcia',
                'feminismo': 'Feminismo Radical'
            };
            return names[category] || 'Geral';
        }

        // Filter jokes by category
        categoryButtons.forEach(button => {
            button.addEventListener('click', function() {
                categoryButtons.forEach(btn => btn.classList.remove('active'));
                this.classList.add('active');
                const category = this.getAttribute('data-category');
                displayJokes(category);
            });
        });

        // Random joke
        randomBtn.addEventListener('click', function() {
            const randomJoke = jokes[Math.floor(Math.random() * jokes.length)];
            jokesContainer.innerHTML = '';
            
            const jokeCard = document.createElement('div');
            jokeCard.className = 'joke-card bg-white dark:bg-gray-800 rounded-xl p-6 shadow-md fade-in col-span-1 md:col-span-2 lg:col-span-3';
            jokeCard.innerHTML = `
                <div class="flex justify-between items-start">
                    <div class="flex-1">
                        <span class="inline-block px-3 py-1 text-xs font-semibold rounded-full mb-3 
                            ${getCategoryColor(randomJoke.category)}">
                            ${getCategoryName(randomJoke.category)}
                        </span>
                        <p class="text-gray-800 dark:text-gray-200 text-xl mb-4">${randomJoke.content}</p>
                    </div>
                    <button class="like-btn ml-4 text-gray-400 hover:text-accent transition" data-id="${randomJoke.id}">
                        <i class="far fa-heart"></i>
                        <span class="text-xs ml-1 like-count">${randomJoke.likes}</span>
                    </button>
                </div>
            `;
            jokesContainer.appendChild(jokeCard);

            // Add event listener to like button
            document.querySelector('.like-btn').addEventListener('click', function() {
                const id = parseInt(this.getAttribute('data-id'));
                const joke = jokes.find(j => j.id === id);
                if (joke) {
                    joke.likes++;
                    this.querySelector('.like-count').textContent = joke.likes;
                    this.innerHTML = `<i class="fas fa-heart text-accent"></i><span class="text-xs ml-1 like-count">${joke.likes}</span>`;
                }
            });
        });

        // Theme toggle
        themeToggle.addEventListener('click', function() {
            document.documentElement.classList.toggle('dark');
            localStorage.setItem('theme', document.documentElement.classList.contains('dark') ? 'dark' : 'light');
        });

        // Check for saved theme preference
        if (localStorage.getItem('theme') === 'dark' || (!localStorage.getItem('theme') && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark');
        } else {
            document.documentElement.classList.remove('dark');
        }

        // Initialize
        displayJokes();
    </script>
