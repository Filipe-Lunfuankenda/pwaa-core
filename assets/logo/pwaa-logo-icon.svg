<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500" width="500" height="500">
  <defs>
    <!-- Logo Gradient (Electric Cyan to Purple) -->
    <linearGradient id="logoGrad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00F2FE" />
      <stop offset="100%" stop-color="#4FACFE" />
    </linearGradient>

    <!-- Deep Blue Gradient for the 3D Box -->
    <linearGradient id="boxLeft" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00A8E8" />
      <stop offset="100%" stop-color="#007EA7" />
    </linearGradient>
    <linearGradient id="boxRight" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#007EA7" />
      <stop offset="100%" stop-color="#003459" />
    </linearGradient>

    <!-- Very Soft Minimal Glow -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="5" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- 3D Isometric Cube/Box (The Archive) - Centered Icon -->
  <g transform="translate(250, 250)">
    
    <!-- Inner glowing light from the box (reduced) -->
    <polygon points="0,0 -112.5,-65 0,-130 112.5,-65" fill="url(#logoGrad)" opacity="0.1" filter="url(#glow)"/>

    <!-- Left face of the cube -->
    <path d="M 0 0 L 0 130 L -112.5 65 L -112.5 -65 Z" fill="url(#boxLeft)" />
    
    <!-- Right face of the cube -->
    <path d="M 0 0 L 0 130 L 112.5 65 L 112.5 -65 Z" fill="url(#boxRight)" />
    
    <!-- Code Brackets '< / >' emerging from inside the box -->
    <g stroke="url(#logoGrad)" stroke-width="12" stroke-linecap="round" stroke-linejoin="round" fill="none">
      <path d="M -30 -20 L -60 -45 L -30 -70" />
      <path d="M 30 -20 L 60 -45 L 30 -70" />
      <path d="M -15 0 L 15 -90" />
    </g>

    <!-- Top face representing the Web Lid (Floating above) -->
    <path d="M 0 -40 L -112.5 -105 L 0 -170 L 112.5 -105 Z" fill="none" stroke="url(#logoGrad)" stroke-width="6" stroke-linejoin="round" filter="url(#glow)"/>
    <path d="M 0 -40 L -112.5 -105 L 0 -170 L 112.5 -105 Z" fill="none" stroke="#FFFFFF" stroke-width="3" stroke-linejoin="round"/>
  </g>
</svg>
